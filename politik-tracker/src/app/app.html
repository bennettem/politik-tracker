<app-header-component />

<main>
  <ul id="resources" class="resource-cards">
    @for (resource of resources; track resource.name) {
      <li class="resource-card">
        <app-resource-tracker [selectedResource]="resource" class="resource-items-wrapper" />
      </li>
    } @empty {
      <li>There are no items.</li>
    }
  </ul>
</main>
