<span class="mobile-name">{{ selectedResource()?.name }}</span>
<div class="resource-item">
  <span class="desktop-name">{{ selectedResource()?.name }}</span>
  <div class="img-wrapper">
    <img [src]="imagePath" [alt]="selectedResource()?.name + ' Resource Icon'" />
  </div>
</div>
<div class="resource-counter">
  <!-- <button (click)="handleCounter('minus')" type="button" id="decrease" class="btn decrease"> -->
  <!-- add events to button -->
  <button
    (pointerdown)="startCounter('minus')"
    (pointerup)="stopCounter()"
    (pointerleave)="stopCounter()"
    (pointercancel)="stopCounter()"
    type="button"
    id="decrease"
    class="btn decrease"
  >
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
      <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
      <g id="SVGRepo_iconCarrier">
        <path
          d="M6 12L18 12"
          stroke="#f7f5e9"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></path>
      </g>
    </svg>
  </button>
  <input
    type="number"
    id="counter"
    min="0"
    max="20000"
    readonly
    [ngModel]="count()"
    (ngModelChange)="count.set($event)"
    (change)="onInputChange()"
  />
  <!-- <button (click)="handleCounter('plus')" type="button" id="increase" class="btn increase"> -->
  <button
    (pointerdown)="startCounter('plus')"
    (pointerup)="stopCounter()"
    (pointerleave)="stopCounter()"
    (pointercancel)="stopCounter()"
    type="button"
    id="increase"
    class="btn increase"
  >
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
      <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
      <g id="SVGRepo_iconCarrier">
        <path
          d="M6 12H18M12 6V18"
          stroke="#f7f5e9"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></path>
      </g>
    </svg>
  </button>
</div>
