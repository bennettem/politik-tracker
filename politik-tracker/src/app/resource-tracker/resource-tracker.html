<div class="resource-item">
  {{ selectedResource()?.name }}
  <div class="img-wrapper">
    <img [src]="imagePath" [alt]="selectedResource()?.name + ' Resource Icon'" />
  </div>
</div>
<div class="resource-counter">
  <button (click)="handleIncrement()" type="button" id="increase" class="btn increase">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
      <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
      <g id="SVGRepo_iconCarrier">
        <path
          d="M6 12H18M12 6V18"
          stroke="#242323"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></path>
      </g>
    </svg>
  </button>
  <!-- <input type="number" id="counter" min="0" max="20000" value="0" /> -->
  <span class="counter">{{ count }}</span>
  <button (click)="handleDecrement()" type="button" id="decrease" class="btn decrease">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
      <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
      <g id="SVGRepo_iconCarrier">
        <path
          d="M6 12L18 12"
          stroke="#242323"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></path>
      </g>
    </svg>
  </button>
</div>
